<!DOCTYPE html>
<html lang="en-CA">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <meta name="author" content="Luna Nobles"/>
        <meta name="description" content="A volunteer hours logger.">

        <title>Volunteer Logger</title>
        <link rel="icon" type="img/svg+xml" href=""/>

        <link rel="stylesheet" href="./styles_font.css"/>
        <link rel="stylesheet" href="./styles_general.css"/>
        <link rel="stylesheet" href="./styles_special.css"/>
    </head>

    <body>
        <div style="justify-self: right;">
            <label for="sign_in">Sign in as:</label>
            <select id="sign_in">
                <option></option>
            </select>
        </div>
        <h1>Volunteer Hours Logger</h1>
        <main class="splitport_even">
            <section id="forms_content">
                <form id="form_volunteer">
                    <h2>Create a new event/volunteer</h2>
                    <hr/>
                    <div id="name_input_area">
                        <h3 for="volunteer_names">Name:</h3>
                        <div class="indent">
                            <select id="volunteer_names" title="Select a volunteer's name from the list to begin...">
                                <option selected disabled>...pick a name</option>
                                <option>test</option>
                            </select>
                            <input id="volunteer_names_new" type="text" placeholder="New Volunteer Name..." title="Select '...New Volunteer...' to use this..." disabled/>
                        </div>
                    </div>
                    <div class="splitport_even">
                        <div>
                            <div class="event_details event_details_left">
                                <label for="volunteer_hours">Hours:</label><br/>
                                <input id="volunteer_hours" type="number" class="indent"><br/>
                            </div>
                            <div class="event_details event_details_left">
                                <label for="event_date">Event Date:</label><br/>
                                <input id="event_date" type="date" title="Event Date" class="indent">
                            </div>
                        </div>
                        <div class="event_details event_details_right">
                            <label for="volunteer_opprotunity">Event Type:</label><br/>
                            <div>
                                <select id="volunteer_opprotunity">
                                    <option selected disabled>...Select an Event...</option>
                                    <option>test</option>
                                </select>
                                <input id="volunteer_opprotunity_new" type="text" title="Select '...New Event...' from the dropdown to use this..." disabled>
                            </div>
                        </div>
                    </div>
                    <button id="add_to_volunteer_button" type="button">Submit</button>
                </form>
                <form id="form_delete">
                    <p>Hidden by defualt.</p>
                    <h3 for="event_to_delete_dropdown">Delete an event:</h3>
                    <select id="event_to_delete_dropdown" title="Select an event to delete from the volunteers history...">
                        <option selected disabled>...Select an Event...</option>
                        <option>test</option>
                    </select>
                    <button type="button" id="delete_event_confirm_button">Delete</button>
                </form>
            </section>
            <section id="data_content">
                <h3>Volunteers | <button id="download_button" type="button">Download JSON Data</button></h3>
                <table>
                    <colgroup>
                        <col>
                        <col>
                        <col>
                    </colgroup>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Hours</th>
                            <th>...</th>
                        </tr>
                    </thead>
                    <tbody id="volunteers_table_body">
                        <tr>
                            <td>Test Person</td>
                            <td>100.12</td>
                            <td><span class="material-symbols-rounded">arrow_drop_up</span></td>
                        </tr>
                        <tr>
                            <td>Test Person</td>
                            <td>100.12</td>
                            <td><span class="material-symbols-rounded">arrow_drop_up</span></td>
                        </tr>
                        <tr>
                            <td>Test Person</td>
                            <td>100.12</td>
                            <td><span class="material-symbols-rounded">arrow_drop_up</span></td>
                        </tr>
                        <tr>
                            <td>Test Person</td>
                            <td>100.12</td>
                            <td><span class="material-symbols-rounded">arrow_drop_up</span></td>
                        </tr>
                        <tr>
                    </tbody>
                </table>
            </section>
        </main>
        <p id="test_string">.test.</p>
        <script src="./design.js"></script>
        <script src="./information.js"></script>
    </body>
</html>
